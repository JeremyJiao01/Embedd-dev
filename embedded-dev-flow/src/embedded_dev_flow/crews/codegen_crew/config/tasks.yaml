generate_code:
  description: >
    根据以下模块设计，生成完整的 C 语言源代码（.c 和 .h 文件）：

    模块设计：
    {design}

    代码生成规则：
    1. 先用 get_snippet 工具查看 2-3 个已有源文件，学习项目的代码风格
    2. 严格按照设计中的伪代码逻辑实现，只调用设计中列出的接口
    3. .h 文件包含 include guard、函数声明、必要的类型定义
    4. .c 文件包含函数实现、静态变量声明
    5. 函数命名、变量命名、注释风格必须与已有代码保持一致
    6. 不使用 malloc/free，不使用递归
    7. 每个文件都是完整可编译的代码
  expected_output: >
    完整的 .c 和 .h 文件内容，每个文件包含文件名和完整源代码。
  agent: c_developer
